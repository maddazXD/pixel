  <body>
    <div id="root">Loading...</div>
    <script>
      // 1) Paksa app ngitung ulang skala beberapa saat setelah load
      window.addEventListener('load', function () {
        setTimeout(function () { window.dispatchEvent(new Event('resize')); }, 300);
        setTimeout(function () { window.dispatchEvent(new Event('resize')); }, 800);
        setTimeout(function () { window.dispatchEvent(new Event('resize')); }, 1500);
      });

      // 2) Terjemahin touch jadi mouse event, biar drag-tool (yg cuma dengerin
      //    onMouseDown/onMouseMove/onMouseUp) bisa jalan di touchscreen.
      (function () {
        function fireMouse(type, touch, target) {
          var evt = new MouseEvent(type, {
            bubbles: true,
            cancelable: true,
            view: window,
            clientX: touch.clientX,
            clientY: touch.clientY,
            screenX: touch.screenX,
            screenY: touch.screenY,
            button: 0,
            buttons: type === 'mouseup' ? 0 : 1
          });
          target.dispatchEvent(evt);
        }

        document.addEventListener('touchstart', function (e) {
          if (e.touches.length !== 1) return;
          var t = e.touches[0];
          fireMouse('mousedown', t, t.target);
        }, { passive: true });

        document.addEventListener('touchmove', function (e) {
          if (e.touches.length !== 1) return;
          var t = e.touches[0];
          var el = document.elementFromPoint(t.clientX, t.clientY) || t.target;
          fireMouse('mousemove', t, el);
        }, { passive: true });

        document.addEventListener('touchend', function (e) {
          var t = e.changedTouches[0];
          fireMouse('mouseup', t, t.target);
        }, { passive: true });

        document.addEventListener('touchcancel', function (e) {
          var t = e.changedTouches[0];
          fireMouse('mouseup', t, t.target);
        }, { passive: true });
      })();
    </script>
  </body>
